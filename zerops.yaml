zerops:
  - setup: app
    build:
      base: nodejs@22
      buildCommands:
        - npm ci
      deployFiles:
        - node_modules
        - index.js
        - package.json
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      start: npm start
  - setup: prod
    build:
      base: nodejs@22
      buildCommands:
        - npm ci
      deployFiles:
        - node_modules
        - index.js
        - package.json
    run:
      base: nodejs@22
      ports:
        - port: 3000
          httpSupport: true
      start: npm start
