zerops:
  # Development half ('app'): full source, runs the server directly.
  - setup: dev
    build:
      base: bun@1.3
      deployFiles:
        - ./
    run:
      base: bun@1.3
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: "3000"
        NODE_ENV: development
      start: bun src/index.ts
      healthCheck:
        httpGet:
          port: 3000
          path: /status

  # Production / stage half ('appstage' and the promoted prod runtime).
  # No dependencies → no build step; deploy the source tree and run it.
  - setup: prod
    build:
      base: bun@1.3
      deployFiles:
        - ./
    run:
      base: bun@1.3
      ports:
        - port: 3000
          httpSupport: true
      envVariables:
        PORT: "3000"
        NODE_ENV: production
      start: bun src/index.ts
      healthCheck:
        httpGet:
          port: 3000
          path: /status
